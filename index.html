<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE/MAX TERRA · Dashboard Asesores</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a32;--red:#e63946;--amber:#f4a261;--green:#2ec4b6;--blue:#4cc9f0;--text:#e8e8f0;--muted:#6b6b80;--accent:#cc0000;--gold:#d4af37;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.header{background:linear-gradient(135deg,#0a0a0c 0%,#1a0505 100%);border-bottom:1px solid #2a0808;padding:24px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-area{display:flex;align-items:center;gap:16px;}
.logo-badge{background:var(--accent);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;padding:6px 14px;border-radius:4px;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;}
.header-sub{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.date-badge{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;color:var(--muted);}
.date-badge span{color:var(--text);font-weight:600;}
.counters{padding:20px 32px 8px;display:flex;gap:12px;max-width:1400px;margin:0 auto;flex-wrap:wrap;}
.counter-pill{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:8px 16px;font-size:13px;}
.counter-dot{width:10px;height:10px;border-radius:50%;}
.dot-red{background:var(--red);}.dot-amber{background:var(--amber);}.dot-green{background:var(--green);}.dot-blue{background:var(--blue);}
.counter-num{font-weight:700;font-size:16px;}
.legend{padding:4px 32px 16px;max-width:1400px;margin:0 auto;display:flex;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-swatch{width:12px;height:12px;border-radius:2px;}
.section-label{padding:20px 32px 8px;max-width:1400px;margin:0 auto;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;padding:0 32px 24px;max-width:1400px;margin:0 auto;}
.card{background:var(--surface);border-radius:14px;overflow:hidden;border:1px solid var(--border);transition:transform .15s,box-shadow .15s;cursor:pointer;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.color-red{border-left:3px solid var(--red);}.color-amber{border-left:3px solid var(--amber);}.color-green{border-left:3px solid var(--green);}.novato-card{border-left:3px solid var(--blue);}
.card-header{padding:16px 18px 12px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border);}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.1;}
.card-sir{font-size:11px;color:var(--muted);margin-top:3px;}
.card-months-badge{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:600;white-space:nowrap;}
.badge-red{background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3);}
.badge-amber{background:rgba(244,162,97,.15);color:var(--amber);border:1px solid rgba(244,162,97,.3);}
.badge-green{background:rgba(46,196,182,.15);color:var(--green);border:1px solid rgba(46,196,182,.3);}
.badge-blue{background:rgba(76,201,240,.15);color:var(--blue);border:1px solid rgba(76,201,240,.3);}
.novato-strip{background:rgba(76,201,240,.08);border-bottom:1px solid rgba(76,201,240,.2);padding:4px 18px;font-size:11px;color:var(--blue);letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.card-body{padding:14px 18px;}
.pct-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
.pct-num{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:1px;line-height:1;}
.color-red .pct-num{color:var(--red);}.color-amber .pct-num{color:var(--amber);}.color-green .pct-num{color:var(--green);}.novato-card .pct-num{color:var(--blue);}
.pct-label{font-size:11px;color:var(--muted);text-align:right;}
.pct-label strong{display:block;font-size:13px;color:var(--text);}
.bar-bg{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:12px;}
.bar-fill{height:100%;border-radius:99px;max-width:100%;}
.color-red .bar-fill{background:linear-gradient(90deg,#8b0000,var(--red));}
.color-amber .bar-fill{background:linear-gradient(90deg,#b34700,var(--amber));}
.color-green .bar-fill{background:linear-gradient(90deg,#0a6e69,var(--green));}
.novato-card .bar-fill{background:linear-gradient(90deg,#0b4f6c,var(--blue));}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.metric{background:var(--surface2);border-radius:8px;padding:8px 10px;}
.metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.metric-value{font-size:13px;font-weight:600;}
.action-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:5px 10px;border-radius:6px;margin-bottom:10px;}
.action-urgent{background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3);}
.action-watch{background:rgba(244,162,97,.15);color:var(--amber);border:1px solid rgba(244,162,97,.3);}
.ops-toggle{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);padding:8px 0 0;border-top:1px solid var(--border);cursor:pointer;user-select:none;}
.ops-toggle:hover{color:var(--text);}
.toggle-arrow{transition:transform .2s;font-size:10px;}
.toggle-arrow.open{transform:rotate(180deg);}
.ops-list{display:none;margin-top:8px;gap:4px;flex-direction:column;}
.ops-list.open{display:flex;}
.op-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:6px;padding:6px 10px;font-size:12px;}
.op-tipo{font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:4px;margin-right:6px;flex-shrink:0;}
.op-venta{background:rgba(46,196,182,.15);color:var(--green);}
.op-renta{background:rgba(244,162,97,.12);color:var(--amber);}
.op-rol{font-size:9px;font-weight:700;letter-spacing:1px;padding:1px 5px;border-radius:3px;margin-right:5px;flex-shrink:0;}
.rol-a1{background:rgba(255,255,255,.06);color:var(--muted);}
.rol-a2{background:rgba(76,201,240,.12);color:var(--blue);}
.op-left{display:flex;align-items:center;flex:1;min-width:0;}
.op-prop{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.op-right{display:flex;align-items:center;gap:6px;}
.op-monto{font-weight:600;color:var(--text);white-space:nowrap;}
.op-fecha{font-size:10px;color:var(--muted);white-space:nowrap;}
.apt-section{margin-top:8px;}
.apt-header{font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.apt-row{display:flex;align-items:center;justify-content:space-between;background:rgba(212,175,55,.05);border:1px solid rgba(212,175,55,.12);border-radius:6px;padding:5px 10px;font-size:11px;margin-bottom:3px;}
.apt-prop{color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.apt-monto{color:var(--gold);font-weight:600;white-space:nowrap;margin-left:8px;}
.activity-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;}
.activity-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600;}
.month-tabs{display:flex;gap:6px;margin-bottom:6px;}
.month-tab{flex:1;border-radius:8px;padding:8px 10px;border:1px solid var(--border);background:var(--surface2);}
.month-tab-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.month-tab.mayo .month-tab-label{color:#f9c74f;}
.month-tab.junio .month-tab-label{color:var(--blue);}
.month-tab.mayo{background:rgba(249,199,79,.06);border-color:rgba(249,199,79,.25);}
.month-tab.junio{background:rgba(76,201,240,.06);border-color:rgba(76,201,240,.2);}
.act-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.act-val{font-weight:700;font-size:15px;}
.month-tab.mayo .act-val{color:#f9c74f;}
.month-tab.junio .act-val{color:var(--blue);}
.act-val.zero{color:var(--muted);font-weight:400;font-size:12px;}
.opc-breakdown{margin-top:3px;display:flex;gap:5px;flex-wrap:wrap;}
.opc-chip{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.5px;}
.chip-r{background:rgba(244,162,97,.15);color:var(--amber);}
.chip-v{background:rgba(46,196,182,.15);color:var(--green);}
.chip-zero{background:rgba(107,107,128,.1);color:var(--muted);}
@media(max-width:600px){
  .header{padding:16px;flex-direction:column;gap:12px;}
  .counters,.grid,.legend,.section-label{padding-left:16px;padding-right:16px;}
  .month-tabs{flex-direction:column;}
}
</style>
</head>

const fmt = n => '$' + Math.round(n).toLocaleString('es-MX');
const fmtK = n => n >= 1000000 ? '$'+(n/1000000).toFixed(1)+'M' : n >= 1000 ? '$'+(n/1000).toFixed(0)+'K' : '$'+Math.round(n);

document.getElementById('today-date').textContent = DATA.today;

const red = DATA.advisors.filter(a=>a.color==='red'&&!a.is_novato).length;
const amber = DATA.advisors.filter(a=>a.color==='amber').length;
const green = DATA.advisors.filter(a=>a.color==='green').length;
const novatos = DATA.advisors.filter(a=>a.is_novato).length;
document.getElementById('counters').innerHTML = `
  <div class="counter-pill"><div class="counter-dot dot-red"></div><span class="counter-num">${red}</span>&nbsp;Requieren One-to-One</div>
  <div class="counter-pill"><div class="counter-dot dot-amber"></div><span class="counter-num">${amber}</span>&nbsp;Seguimiento</div>
  <div class="counter-pill"><div class="counter-dot dot-green"></div><span class="counter-num">${green}</span>&nbsp;Cumpliendo</div>
  <div class="counter-pill"><div class="counter-dot dot-blue"></div><span class="counter-num">${novatos}</span>&nbsp;Novatos &lt;4 meses</div>
  <div class="counter-pill">👥&nbsp;<span class="counter-num">${DATA.advisors.length}</span>&nbsp;Asesores activos</div>`;

function chip(label, val, cls) {
  return `<span class="opc-chip ${val>0?cls:'chip-zero'}">${label} ${val>0?val:'—'}</span>`;
}

function buildMonthBlock(monthClass, monthLabel, rec, opc, opcR, opcV, mostradas) {
  const opcBd = opc > 0
    ? `<div class="opc-breakdown">${chip('R',opcR,'chip-r')}${chip('V',opcV,'chip-v')}</div>`
    : '';
  return `
    <div class="month-tab ${monthClass}">
      <div class="month-tab-label">${monthLabel}</div>
      <div class="act-row"><span style="color:var(--muted);font-size:10px">Recorridos</span><span class="act-val ${rec===0?'zero':''}">${rec>0?rec:'—'}</span></div>
      <div class="act-row"><span style="color:var(--muted);font-size:10px">Opcionadas</span><span class="act-val ${opc===0?'zero':''}">${opc>0?opc:'—'}</span></div>
      ${opcBd}
      <div class="act-row" style="margin-top:3px"><span style="color:var(--muted);font-size:10px">Mostr.</span><span class="act-val ${mostradas===0?'zero':''}" style="font-size:13px">${mostradas>0?mostradas:'—'}</span></div>
    </div>`;
}

function buildCard(a, i) {
  const isNovato = a.is_novato;
  const cardClass = isNovato ? 'novato-card' : `color-${a.color}`;
  const badgeClass = isNovato ? 'badge-blue' : `badge-${a.color}`;
  const barW = Math.min(100, a.pct);
  const targetLabel = a.monthly_target>=1000 ? '$'+(a.monthly_target/1000)+'K' : '$'+a.monthly_target;

  const actionBadge = a.color==='red'&&!isNovato
    ? `<div class="action-badge action-urgent">⚠ One-to-One requerido</div>`
    : a.color==='amber'
    ? `<div class="action-badge action-watch">👁 Seguimiento cercano</div>`
    : '';

  const opsHtml = a.ops.length > 0
    ? a.ops.map(op=>`
      <div class="op-row">
        <div class="op-left">
          <span class="op-tipo ${op.tipo==='VENTA'?'op-venta':'op-renta'}">${op.tipo}</span>
          <span class="op-rol ${op.rol==='A1'?'rol-a1':'rol-a2'}">${op.rol}</span>
          <span class="op-prop" title="${op.prop}">${op.prop}</span>
        </div>
        <div class="op-right">
          <span class="op-fecha">${op.fecha}</span>
          <span class="op-monto">${fmt(op.monto)}</span>
        </div>
      </div>`).join('')
    : '<div style="font-size:12px;color:var(--muted);padding:4px 0">Sin operaciones cerradas en 2026</div>';

  const aptHtml = a.apartados.length > 0 ? `
    <div class="apt-section">
      <div class="apt-header">📋 Apartados en proceso (${a.apartados.length})</div>
      ${a.apartados.map(ap=>`
        <div class="apt-row">
          <span class="apt-prop" title="${ap.prop}">${ap.tipo==='VENTA'?'🏠':'🔑'} ${ap.prop}</span>
          <span class="apt-monto">${fmtK(ap.monto)}</span>
        </div>`).join('')}
    </div>` : '';

  const mayoLabel = a.mayo_income > 0
    ? `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;background:rgba(249,199,79,.1);border:1px solid rgba(249,199,79,.25);border-radius:6px;padding:3px 8px;margin-right:6px;margin-bottom:8px">
        <span style="color:#f9c74f;font-weight:700">Mayo</span><span style="font-weight:600">${fmt(a.mayo_income)}</span>
      </span>` : '';
  const junioLabel = a.junio_income > 0
    ? `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;background:rgba(76,201,240,.1);border:1px solid rgba(76,201,240,.25);border-radius:6px;padding:3px 8px;margin-bottom:8px">
        <span style="color:var(--blue);font-weight:700">Junio</span><span style="font-weight:600">${fmt(a.junio_income)}</span>
      </span>` : '';
  const monthlyIncome = (mayoLabel || junioLabel) ? `<div>${mayoLabel}${junioLabel}</div>` : '';

  const actHtml = `
    <div class="activity-section">
      <div class="activity-title">📊 Actividad · Mayo &amp; Junio 2026</div>
      <div class="month-tabs">
        ${buildMonthBlock('mayo','Mayo',a.may_rec,a.may_opc,a.may_opc_r,a.may_opc_v,a.may_opc_mostradas)}
        ${buildMonthBlock('junio','Junio',a.jun_rec,a.jun_opc,a.jun_opc_r,a.jun_opc_v,a.jun_opc_mostradas)}
      </div>
    </div>`;

  return `
  <div class="card ${cardClass}" id="card-${i}">
    ${isNovato?'<div class="novato-strip">🔵 Novato · En proceso de arranque</div>':''}
    <div class="card-header">
      <div>
        <div class="card-name">${a.display}</div>
        <div class="card-sir">SIR: ${a.sir} · ${a.raw_months} mes${a.raw_months!==1?'es':''} en agencia</div>
      </div>
      <div class="card-months-badge ${badgeClass}">${targetLabel}/mes</div>
    </div>
    <div class="card-body">
      ${actionBadge}
      <div class="pct-row">
        <div class="pct-num">${a.pct}%</div>
        <div class="pct-label"><strong>${fmt(a.total_income)}</strong>de ${fmt(a.total_target)} meta</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">Meta/mes</div><div class="metric-value">${targetLabel}</div></div>
        <div class="metric"><div class="metric-label">Meses 2026</div><div class="metric-value">${a.active_months_2026}</div></div>
        <div class="metric"><div class="metric-label">Operaciones</div><div class="metric-value">${a.ops.length}</div></div>
      </div>
      ${monthlyIncome}
      <div class="ops-toggle" onclick="toggleOps(${i})">
        <span>Ver detalle · ${a.ops.length} operación${a.ops.length!==1?'es':''} · ${a.apartados.length} apartado${a.apartados.length!==1?'s':''}</span>
        <span class="toggle-arrow" id="arrow-${i}">▼</span>
      </div>
      <div class="ops-list" id="ops-${i}">
        ${opsHtml}
        ${aptHtml}
      </div>
      ${actHtml}
    </div>
  </div>`;
}

const sections = [
  {label:'🔴 Requieren Atención Inmediata', filter:a=>a.color==='red'&&!a.is_novato},
  {label:'🟡 Seguimiento Cercano', filter:a=>a.color==='amber'},
  {label:'🟢 Cumpliendo Meta', filter:a=>a.color==='green'},
  {label:'🔵 Novatos · Menos de 4 Meses', filter:a=>a.is_novato},
];

let html=''; let idx=0;
for(const sec of sections){
  const list=DATA.advisors.filter(sec.filter);
  if(!list.length) continue;
  html+=`<div class="section-label">${sec.label}</div><div class="grid">`;
  for(const a of list) html+=buildCard(a,idx++);
  html+='</div>';
}
document.getElementById('app').innerHTML=html;

function toggleOps(i){
  document.getElementById('ops-'+i).classList.toggle('open');
  document.getElementById('arrow-'+i).classList.toggle('open');
}
</script>
